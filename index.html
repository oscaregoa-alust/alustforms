<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALUST — Objects & Spaces</title>

  <style>
    :root{ --bg:#0b0b0b; --fg:#eaeaea; --pad:22px; }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font:400 16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      overflow-x:hidden;
    }

    .hero{
      height:100vh;
      display:flex;
    }

    .hero-left{
      width:65%;
      background:url("images/hero-left.jpg") center/cover no-repeat;
    }

    .hero-right{
      width:35%;
      background:url("images/hero-right.jpg") center/cover no-repeat;
    }

    .row{
      display:flex;
      width:100%;
    }

    .cell{
      flex:1;
    }

    img{
      width:100%;
      display:block;
    }

    .w65{ flex-basis:65%; max-width:65%; }
    .w35{ flex-basis:35%; max-width:35%; }

    @media (max-width:900px){
      .hero{
        flex-direction:column;
        height:auto;
      }

      .hero-left,
      .hero-right{
        width:100%;
        height:50vh;
      }

      .row{
        flex-direction:column;
      }

      .cell,
      .w65,
      .w35{
        flex-basis:100% !important;
        max-width:100% !important;
      }
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-left"></div>
  <div class="hero-right"></div>
</div>

<!-- ROW 1 -->
<div class="row">
  <div class="cell w65">
    <img src="images/work-01.jpg">
  </div>
  <div class="cell w35">
    <img src="images/work-02.jpg">
  </div>
</div>

<!-- ROW 2 -->
<div class="row">
  <div class="cell">
    <img src="images/work-07.jpg">
  </div>
</div>

<!-- ROW 3 -->
<div class="row">
  <div class="cell w35">
    <img src="images/work-03.jpg"> <!-- FIXED -->
  </div>
  <div class="cell w65">
    <img src="images/work-04.jpg">
  </div>
</div>

<!-- ROW 4 -->
<div class="row">
  <div class="cell">
    <img src="images/work-05.jpg">
  </div>
  <div class="cell">
    <img src="images/work-09.jpg">
  </div>
</div>

<!-- ROW 5 -->
<div class="row">
  <div class="cell">
    <img src="images/work-06.jpg">
  </div>
  <div class="cell">
    <img src="images/work-08.jpg">
  </div>
</div>

<!-- ROW 6 -->
<div class="row">
  <div class="cell">
    <img src="images/work-10.jpg">
  </div>
</div>

</body>
</html>
