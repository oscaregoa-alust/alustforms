<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALUST — Objects & Spaces</title>
  <style>
    :root{ --bg:#0b0b0b; --fg:#eaeaea; --pad:22px; }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; background:var(--bg); color:var(--fg);
      font:400 16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }
    a{color:inherit; text-decoration:none}
    a:hover{opacity:.8}
    .vertical-label{
      position:fixed; top:50%; left:0;
      transform:translateY(-50%) rotate(-90deg);
      transform-origin:left top;
      font-size:.9rem; letter-spacing:.35em; z-index:50;
      color:#fff; white-space:nowrap; opacity:.95;
      padding-left:10px; pointer-events:none; font-weight:600;
    }
    .util{
      position:fixed; right:0; top:0; height:64px;
      display:flex; align-items:center; gap:48px;
      padding:0 var(--pad); z-index:50;
      font-size:.9rem; letter-spacing:.28em;
    }
    .util a{ color:#fff; font-weight:600; }
    .hero{
      position:relative; height:100vh; min-height:540px; overflow:hidden;
    }
    .hero-left, .hero-right{
      position:absolute; top:0; bottom:0;
      background-position:center; background-size:cover;
    }
    .hero-left { left:0; width:65%; background-image:url("images/hero-left.jpg"); }
    .hero-right{ right:0; width:35%; background-image:url("images/hero-right.jpg"); }
    .logo-overlay{
      position:fixed; inset:0; display:grid; place-items:center;
    }
    .logo{ max-height:230px; }
    section{
      font-size:0;
      line-height:0;
    }
    .row{
      display:flex;
      width:100%;
      gap:0;
      margin:0;
      padding:0;
    }
    .cell{
      flex:1;
      margin:0;
      padding:0;
      line-height:0;
    }
    img{
      width:100%;
      display:block;
      margin:0;
      padding:0;
    }
    .w65{ flex-basis:65%; max-width:65%; }
    .w35{ flex-basis:35%; max-width:35%; }
    @media (max-width:900px){
      .hero{ flex-direction:column; height:auto; }
      .hero-left, .hero-right{ width:100%; height:50vh; }
      .row{ flex-direction:column; }
      .cell, .w65, .w35{
        flex-basis:100% !important;
        max-width:100% !important;
      }
    }
  </style>
</head>
<body>
<div class="vertical-label">DESIGN STUDIO</div>
<nav class="util">
  <a href="contact.html">CONTACT</a>
  <a href="https://www.instagram.com/alust.studio/" target="_blank">IG</a>
</nav>
<header class="hero">
  <div class="hero-left"></div>
  <div class="hero-right"></div>
</header>
<section>
  <div class="row">
    <div class="cell w65">
      <img src="images/work-01.jpg">
    </div>
    <div class="cell w35">
      <img src="images/work-02.jpg">
    </div>
  </div>
  <div class="row">
    <div class="cell">
      <img src="images/work-07.jpg">
    </div>
  </div>
  <div class="row">
    <div class="cell w35">
      <img src="images/work-03.png">
    </div>
    <div class="cell w65">
      <img src="images/work-04.jpg">
    </div>
  </div>
  <div class="row">
    <div class="cell">
      <img src="images/work-05.jpg">
    </div>
    <div class="cell">
      <img src="images/work-09.jpg">
    </div>
  </div>
  <div class="row">
    <div class="cell">
      <img src="images/work-06.jpg">
    </div>
    <div class="cell">
      <img src="images/work-08.jpg">
    </div>
  </div>
  <div class="row">
    <div class="cell">
      <img src="images/work-10.jpg">
    </div>
  </div>
</section>
</body>
</html>
