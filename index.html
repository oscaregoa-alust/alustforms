<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALUST — Objects & Spaces</title>
  <style>
    :root{ --bg:#0b0b0b; --fg:#eaeaea; --pad:22px; }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font:400 16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      overflow-x:hidden;
    }
    a{color:inherit; text-decoration:none}
    a:hover{opacity:.8}

    .vertical-label{
      position:fixed; top:50%; left:0;
      transform:translateY(-50%) rotate(-90deg);
      transform-origin:left top;
      font-size:.9rem; letter-spacing:.35em; z-index:50;
      color:#fff; white-space:nowrap; opacity:.95;
      padding-left:10px; pointer-events:none; font-weight:600;
    }

    .util{
      position:fixed; right:0; top:0; height:64px;
      display:flex; align-items:center; gap:48px;
      padding:0 var(--pad); z-index:50;
      font-size:.9rem; letter-spacing:.28em;
    }
    .util a{ color:#fff; font-weight:600; }

    .hero{
      position:relative;
      height:100vh;
      min-height:540px;
      overflow:hidden;
    }
    .hero-left, .hero-right{
      position:absolute; top:0; bottom:0;
      background-position:center;
      background-size:cover;
      background-repeat:no-repeat;
      filter:saturate(98%);
    }
    .hero-left {
      left:0; width:65%;
      background-image:url("images/hero-left.jpg");
    }
    .hero-right{
      right:0; width:35%;
      background-image:url("images/hero-right.jpg");
    }

    .cities{
      position:absolute; right:18px; bottom:18px; z-index:3;
      display:flex; gap:18px; align-items:center;
      font-size:.88rem; letter-spacing:.26em;
    }
    .cities span{ color:#E8E8E8; font-weight:600; }
    .sep{opacity:.5; color:#aaa;}

    .scroll{
      position:absolute; left:24px; bottom:26px; z-index:3;
      width:1px; height:42px; background:#fff; opacity:.6;
      animation:float 1.7s ease-in-out infinite;
    }
    @keyframes float{
      0%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
      100%{transform:translateY(0)}
    }

    .logo-overlay{
      position:fixed; inset:0; height:100vh; z-index:40;
      display:grid; place-items:center; pointer-events:none;
      transition:opacity .25s ease;
    }
    .logo{
      max-height:230px; width:auto; display:block;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.55));
      transition:transform .25s ease;
    }
    .tag{
      margin-top:12px; color:#f2f2f2; opacity:.95;
      letter-spacing:.22em; font-size:clamp(12px,1.5vw,16px);
      transition:opacity .25s ease;
    }

    .strips{ margin:0; padding:0; }

    .row{
      display:flex; gap:0; width:100%;
      height:var(--h, 72vh); min-height:420px;
    }
    .row + .row{ margin-top:0; }

    .cell{
      flex:1 1 auto;
      background-position:center;
      background-size:cover;
      background-repeat:no-repeat;
    }

    .split-50 .cell:first-child,
    .split-50 .cell:last-child {
      flex-basis:50%; max-width:50%;
    }
    .full-100 .cell{
      flex-basis:100%; max-width:100%;
    }

    .h80{ --h:80vh; }
    .h74{ --h:74vh; }
    .h72{ --h:72vh; }
    .h68{ --h:68vh; }

    .row.auto{
      height:auto; min-height:0; align-items:stretch;
    }
    .row.auto .cell:first-child{
      display:flex;
    }
    .row.auto .cell:first-child img{
      width:100%; height:auto; display:block;
    }
    .row.auto .cell:last-child{
      background-size:cover; background-position:center;
      min-height:1px;
    }

    .row.full-100{
      height:auto; min-height:0;
    }
    .row.full-100 .cell{
      background:none; padding:0; margin:0;
    }
    .row.full-100 img{
      display:block; width:100%; height:auto;
    }

    .row.img-row{
      position:relative;
    }
    .row.img-row .cell{
      position:relative;
      overflow:hidden;
    }
    .row.img-row .cell img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
    }

    .row-05-09{
      height:auto;
      min-height:0;
    }
    .row-05-09 .cell{
      height:auto;
    }
    .row-05-09 .cell img{
      height:auto;
      object-fit:contain;
    }

    .desktop-only{}
    .mobile-only{ display:none; }

    @media (max-width:900px){
      .row{ flex-direction:column; height:auto; min-height:0; }
      .cell{ min-height:48vh; }
      .split-50 .cell:first-child,
      .split-50 .cell:last-child,
      .row.auto .cell,
      .row.full-100 .cell{
        max-width:100%;
        flex-basis:100%;
      }
      .row.img-row .cell img{
        height:auto !important;
        object-fit:contain;
      }
      .desktop-only{ display:none !important; }
      .mobile-only{ display:block !important; }
    }
  </style>
</head>

<body>

<div class="vertical-label">DESIGN STUDIO</div>

<nav class="util">
  <a href="contact.html">CONTACT</a>
  <a href="https://instagram.com/alustforms" target="_blank">IG</a>
</nav>

<header class="hero">
  <div class="hero-left"></div>
  <div class="hero-right"></div>
</header>

<section class="strips">

  <div class="row h80 img-row desktop-only">
    <div class="cell" style="flex-basis:65%; max-width:65%;">
      <img src="images/work-01.jpg">
    </div>
    <div class="cell" style="flex-basis:35%; max-width:35%;">
      <img src="images/work-02.jpg">
    </div>
  </div>

  <div class="row split-50 h74 img-row desktop-only">
    <div class="cell" style="flex-basis:35%; max-width:35%;">
      <img src="images/work-03.jpg">
    </div>
    <div class="cell" style="flex-basis:65%; max-width:65%;">
      <img src="images/work-04.jpg">
    </div>
  </div>

  <div class="mobile-only">
    <img src="images/work-01.jpg">
    <img src="images/work-02.jpg">
    <img src="images/work-03.jpg">
    <img src="images/work-04.jpg">
  </div>

  <div class="row full-100">
    <div class="cell">
      <img src="images/work-07.jpg">
    </div>
  </div>

  <div class="row split-50 h72 img-row">
    <div class="cell">
      <img src="images/work-05.jpg">
    </div>
    <div class="cell">
      <img src="images/work-09.jpg">
    </div>
  </div>

  <div class="row split-50 h68">
    <div class="cell" style="background-image:url('images/work-06.jpg')"></div>
    <div class="cell" style="background-image:url('images/work-08.jpg')"></div>
  </div>

  <div class="row full-100">
    <div class="cell">
      <img src="images/work-10.jpg">
    </div>
  </div>

</section>

</body>
</html>
